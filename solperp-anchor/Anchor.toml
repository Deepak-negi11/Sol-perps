[toolchain]
package_manager = "bun"

[features]
resolution = true
skip-lint = false

[programs.localnet]
solperp_anchor = "7oYnX6upn2jhobcxUoarHs7MyyiF7ieZgzMGcjfQhrrD"

[programs.devnet]
solperp_anchor = "7oYnX6upn2jhobcxUoarHs7MyyiF7ieZgzMGcjfQhrrD"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "bun x ts-mocha -p ./tsconfig.json -t 1000000 programs/solperp-anchor/tests/**/*.ts"

[hooks]

